<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fleet Dashboard — The Automat Hub</title>
  <link rel="stylesheet" href="../shared/styles.css"/>
  <style>
    /* Fleet-specific additions */
    .fleet-stat-strip { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--border); flex-shrink:0; }
    .fleet-stat-cell { padding:14px 16px; text-align:center; border-right:1px solid var(--border); }
    .fleet-stat-cell:last-child { border-right:none; }
    .fsc-val { font-size:24px; font-weight:800; letter-spacing:-0.02em; }
    .fsc-lbl { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
    .vehicle-row { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
    .vehicle-row:hover { background:var(--surface2); }
    .vehicle-row.selected { background:var(--orange-dim); border-left:2px solid var(--orange); }
    .vr-info { flex:1; min-width:0; }
    .vr-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .vr-plate { font-family:var(--mono); font-size:10px; color:var(--muted); }
    .vr-score { font-family:var(--mono); font-size:14px; font-weight:700; text-align:right; }
    .vr-speed { font-size:11px; color:var(--muted); text-align:right; margin-top:2px; }
    #map { width:100%; height:100%; min-height:400px; background:var(--surface2); }
    .detail-overlay { position:absolute; top:16px; right:16px; width:270px; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5); display:none; }
    .detail-overlay.open { display:block; animation:fadeUp 0.25s ease; }
    .do-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .do-close { font-size:20px; color:var(--muted); cursor:pointer; }
    .do-body { padding:14px 16px; }
    .do-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(35,35,47,0.5); font-size:12px; }
    .do-row:last-child { border-bottom:none; }
    .ws-indicator { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; }
    .ws-dot { width:7px; height:7px; border-radius:50%; }
  </style>
  <!-- Google Maps loaded dynamically from CONFIG.GOOGLE_MAPS_KEY -->
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden">

<!-- TOP BAR -->
<div class="topbar" style="flex-shrink:0">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:30px;height:30px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px">🚛</div>
    <div>
      <div style="font-size:14px;font-weight:700">Fleet Command Centre</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="fleetLabel">Loading fleet...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="ws-indicator"><div class="ws-dot" id="wsDot" style="background:var(--yellow)"></div><span id="wsLabel" style="color:var(--muted)">Connecting...</span></div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted)" id="lastUpdate">—</div>
    <button class="btn btn-primary btn-sm" onclick="exportReport()">📊 Export CSV</button>
    <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sign Out</button>
  </div>
</div>

<!-- BODY -->
<div style="display:flex;flex:1;overflow:hidden">

  <!-- LEFT SIDEBAR -->
  <div style="width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">

    <!-- FLEET STATS STRIP -->
    <div class="fleet-stat-strip" style="flex-shrink:0">
      <div class="fleet-stat-cell"><div class="fsc-val" id="fs-healthy" style="color:var(--green)">—</div><div class="fsc-lbl">Healthy</div></div>
      <div class="fleet-stat-cell"><div class="fsc-val" id="fs-warning" style="color:var(--yellow)">—</div><div class="fsc-lbl">Warning</div></div>
      <div class="fleet-stat-cell"><div class="fsc-val" id="fs-critical" style="color:var(--red)">—</div><div class="fsc-lbl">Critical</div></div>
      <div class="fleet-stat-cell"><div class="fsc-val" id="fs-total" style="color:var(--blue)">—</div><div class="fsc-lbl">Total</div></div>
    </div>

    <!-- SEARCH -->
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <input id="vehicleSearch" placeholder="Search plate or VIN..." oninput="filterVehicles(this.value)" style="font-size:12px;padding:8px 12px"/>
    </div>

    <!-- VEHICLE LIST -->
    <div id="vehicleList" style="flex:1;overflow-y:auto">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Connecting to live data...</div>
    </div>

    <!-- ALERTS STRIP -->
    <div style="border-top:1px solid var(--border);max-height:180px;overflow-y:auto;flex-shrink:0">
      <div style="padding:8px 14px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em;border-bottom:1px solid var(--border)">ACTIVE ALERTS</div>
      <div id="alertsStrip">
        <div style="padding:12px 14px;color:var(--muted);font-size:12px">No alerts</div>
      </div>
    </div>

    <!-- EXPORT -->
    <div style="padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="exportReport('csv')">📄 CSV</button>
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="exportReport('json')">{ } JSON</button>
    </div>
  </div>

  <!-- MAP AREA -->
  <div style="flex:1;position:relative">
    <div id="map"></div>

    <!-- VEHICLE DETAIL -->
    <div class="detail-overlay" id="detailOverlay">
      <div class="do-header">
        <div style="font-size:13px;font-weight:700" id="do-name">Vehicle</div>
        <div class="do-close" onclick="closeDetail()">×</div>
      </div>
      <div class="do-body">
        <div class="do-row"><span style="color:var(--muted)">VIN</span><span style="font-family:var(--mono);font-size:11px" id="do-vin">—</span></div>
        <div class="do-row"><span style="color:var(--muted)">Status</span><span id="do-status">—</span></div>
        <div class="do-row"><span style="color:var(--muted)">Health</span><span id="do-health" style="font-weight:700">—</span></div>
        <div class="do-row"><span style="color:var(--muted)">Speed</span><span id="do-speed">—</span></div>
        <div class="do-row"><span style="color:var(--muted)">Fuel</span><span id="do-fuel">—</span></div>
        <div class="do-row"><span style="color:var(--muted)">Odometer</span><span id="do-odometer">—</span></div>
        <div id="do-faults" style="display:none;margin-top:10px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px">FAULT CODES</div>
          <div id="do-fault-list"></div>
        </div>
      </div>
      <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="viewVehicleDCP()">View DCP</button>
        <button class="btn btn-primary btn-sm" style="flex:1">Book Service</button>
      </div>
    </div>
  </div>
</div>

<script src="/frontend/shared/config.js"></script>
<script>
  Auth.requireAuth(['fleet_owner', 'admin']);

  let map, markers = {}, vehicles = {}, ws, selectedVehicleId, allVehicles = [];
  const fleetId = localStorage.getItem('automat_fleet_id') || '';

  document.getElementById('fleetLabel').textContent = fleetId ? `Fleet: ${fleetId}` : 'No fleet selected';

  // Load Google Maps dynamically using key from config
  function loadGoogleMaps() {
    if (!CONFIG.GOOGLE_MAPS_KEY || CONFIG.GOOGLE_MAPS_KEY === 'AIzaSyCGtdbX3bJ_vWaJMQ0ZMJHqmH6yxs-iEIc') {
      console.warn('Google Maps key not configured. Map disabled.');
      document.getElementById('map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px;flex-direction:column;gap:8px"><div style="font-size:32px">🗺️</div><div>Map unavailable — add GOOGLE_MAPS_KEY to config.js</div></div>';
      return;
    }
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.GOOGLE_MAPS_KEY}&callback=initMap`;
    script.async = true;
    document.head.appendChild(script);
  }

  // Init Google Map
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 7.3775, lng: 3.9470 },
      zoom: 12,
      styles: [
        {elementType:'geometry',stylers:[{color:'#1a1a24'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#6b6b80'}]},
        {elementType:'labels.text.stroke',stylers:[{color:'#13131a'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#23232f'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0c0c0f'}]},
        {featureType:'poi',stylers:[{visibility:'off'}]},
      ]
    });
  }

  // WebSocket for live tracking
  function connectWS() {
    if (!fleetId) { loadStaticData(); return; }
    const token = localStorage.getItem(CONFIG.TOKEN_KEY);
    ws = new WebSocket(`${CONFIG.WS_URL}/ws/fleet/${fleetId}?token=${token}`);
    ws.onopen = () => { document.getElementById('wsDot').style.background = 'var(--green)'; document.getElementById('wsLabel').textContent = 'Live'; };
    ws.onmessage = e => { const d = JSON.parse(e.data); if(d.type==='fleet_snapshot'||d.type==='fleet_update') updateFleet(d.vehicles), document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString(); if(d.type==='alert') pushAlert(d.alert); };
    ws.onclose = () => { document.getElementById('wsDot').style.background = 'var(--red)'; document.getElementById('wsLabel').textContent = 'Reconnecting...'; setTimeout(connectWS, 5000); };
  }

  async function loadStaticData() {
    const data = await API.get('/fleet/dashboard');
    if (data?.success) updateFleet(data.data?.vehicles || data.vehicles || []);
  }

  function updateFleet(vehicleList) {
    if (!vehicleList) return;
    allVehicles = vehicleList;
    const h = vehicleList.filter(v=>v.status==='healthy').length;
    const w = vehicleList.filter(v=>v.status==='warning').length;
    const c = vehicleList.filter(v=>v.status==='critical').length;
    document.getElementById('fs-healthy').textContent = h;
    document.getElementById('fs-warning').textContent = w;
    document.getElementById('fs-critical').textContent = c;
    document.getElementById('fs-total').textContent = vehicleList.length;
    renderVehicleList(vehicleList);
    vehicleList.forEach(v => { vehicles[v.vehicle_id] = v; if(v.lat&&v.lng) updateMarker(v); });
  }

  function renderVehicleList(list) {
    const el = document.getElementById('vehicleList');
    if (!list.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No vehicles found</div>'; return; }
    el.innerHTML = list.map(v => {
      const sc = v.health_score>=80?'var(--green)':v.health_score>=60?'var(--yellow)':'var(--red)';
      return `<div class="vehicle-row ${selectedVehicleId===v.vehicle_id?'selected':''}" onclick="selectVehicle('${v.vehicle_id}')">
        <div class="status-dot dot-${v.status}" style="width:9px;height:9px"></div>
        <div class="vr-info"><div class="vr-name">${v.make} ${v.model}</div><div class="vr-plate">${v.plate_number||v.vin?.slice(-8)||'—'}</div></div>
        <div><div class="vr-score" style="color:${sc}">${v.health_score||'—'}</div><div class="vr-speed">${v.speed_kmh?v.speed_kmh.toFixed(0)+' km/h':'Parked'}</div></div>
      </div>`;
    }).join('');
  }

  function filterVehicles(q) {
    const filtered = allVehicles.filter(v => !q || (v.plate_number||'').toLowerCase().includes(q.toLowerCase()) || (v.vin||'').toLowerCase().includes(q.toLowerCase()) || `${v.make} ${v.model}`.toLowerCase().includes(q.toLowerCase()));
    renderVehicleList(filtered);
  }

  function updateMarker(vehicle) {
    const pos = { lat: vehicle.lat, lng: vehicle.lng };
    const color = vehicle.status==='healthy'?'#22d07a':vehicle.status==='critical'?'#f0503a':'#f0c03a';
    if (markers[vehicle.vehicle_id]) {
      markers[vehicle.vehicle_id].setPosition(pos);
      const icon = markers[vehicle.vehicle_id].getIcon();
      icon.fillColor = color;
      markers[vehicle.vehicle_id].setIcon(icon);
    } else {
      const m = new google.maps.Marker({ position:pos, map, title:`${vehicle.make} ${vehicle.model}`, icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:'#0c0c0f',strokeWeight:2,scale:8}});
      m.addListener('click', () => selectVehicle(vehicle.vehicle_id));
      markers[vehicle.vehicle_id] = m;
    }
  }

  function selectVehicle(id) {
    selectedVehicleId = id;
    const v = vehicles[id];
    if (!v) return;
    document.querySelectorAll('.vehicle-row').forEach(r => r.classList.remove('selected'));
    document.querySelectorAll('.vehicle-row').forEach(r => { if(r.getAttribute('onclick')?.includes(id)) r.classList.add('selected'); });
    if (v.lat&&v.lng&&map) map.panTo({lat:v.lat,lng:v.lng});
    document.getElementById('do-name').textContent = `${v.make||''} ${v.model||''}`.trim();
    document.getElementById('do-vin').textContent = v.vin||'—';
    document.getElementById('do-status').innerHTML = UI.badge((v.status||'—').toUpperCase(), v.status==='healthy'?'success':v.status==='critical'?'danger':'warning');
    document.getElementById('do-health').textContent = v.health_score ? `${v.health_score}/100` : '—';
    document.getElementById('do-health').style.color = v.health_score>=80?'var(--green)':v.health_score>=60?'var(--yellow)':'var(--red)';
    document.getElementById('do-speed').textContent = v.speed_kmh ? `${v.speed_kmh.toFixed(1)} km/h` : 'Parked';
    document.getElementById('do-fuel').textContent = v.fuel_level ? `${v.fuel_level.toFixed(0)}%` : '—';
    document.getElementById('do-odometer').textContent = v.odometer_km ? `${v.odometer_km.toLocaleString()} km` : '—';
    const faults = v.active_faults||[];
    document.getElementById('do-faults').style.display = faults.length?'block':'none';
    document.getElementById('do-fault-list').innerHTML = faults.map(f=>`<span class="badge badge-red" style="margin:2px">${f}</span>`).join('');
    document.getElementById('detailOverlay').classList.add('open');
    if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({action:'focus',vehicle_id:id}));
  }

  function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); selectedVehicleId=null; }
  function viewVehicleDCP() { const v = vehicles[selectedVehicleId]; if(v) window.open(`../pages/verify.html?dcp=${v.latest_dcp_id||''}`, '_blank'); }

  function pushAlert(alert) {
    const strip = document.getElementById('alertsStrip');
    const color = alert.severity==='critical'?'var(--red)':alert.severity==='warning'?'var(--yellow)':'var(--blue)';
    const el = document.createElement('div');
    el.style.cssText = `display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px`;
    el.innerHTML = `<div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></div><div>${alert.title||alert.message}</div>`;
    strip.insertBefore(el, strip.firstChild);
    if(strip.children.length>10) strip.lastChild.remove();
  }

  function exportReport(format='csv') {
    const token = localStorage.getItem(CONFIG.TOKEN_KEY);
    const url = `${CONFIG.API_URL}/fleet/report/export?format=${format}&days=30${fleetId?'&fleet_id='+fleetId:''}`;
    window.open(url, '_blank');
  }

  window.addEventListener('DOMContentLoaded', () => {
    loadGoogleMaps();
    connectWS();
  });
</script>
</body>
</html>
