<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — The Automat Hub</title>
  <link rel="stylesheet" href="../shared/styles.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .auth-wrap{width:100%;max-width:400px}
    .auth-logo{text-align:center;margin-bottom:28px}
    .auth-logo-box{width:48px;height:48px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}
    .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .auth-footer a{color:var(--orange)}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-box">🔑</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:6px">Forgot Password</div>
    <div style="font-size:13px;color:var(--muted)">We will send a reset link to your email</div>
  </div>
  <div class="auth-card">
    <div id="errorMsg" style="display:none" class="alert alert-error"></div>
    <div id="successMsg" style="display:none" class="alert alert-success"></div>
    <div id="formSection">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <button class="btn btn-primary btn-full" id="sendBtn" onclick="sendReset()">Send Reset Link</button>
    </div>
  </div>
  <div class="auth-footer"><a href="login.html">← Back to Sign In</a></div>
</div>
<script>
  async function sendReset() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('sendBtn');
    const err = document.getElementById('errorMsg');
    const suc = document.getElementById('successMsg');
    if (!email) { err.textContent = 'Enter your email address'; err.style.display='flex'; return; }
    btn.disabled = true; btn.innerHTML = UI.spinner(18) + ' Sending...'; err.style.display='none';
    const data = await API.post('/auth/forgot-password', { email });
    if (data?.success) {
      document.getElementById('formSection').style.display = 'none';
      suc.textContent = 'If that email exists, a reset link has been sent. Check your inbox.';
      suc.style.display = 'flex';
    } else {
      err.textContent = data?.detail || 'Something went wrong. Try again.';
      err.style.display = 'flex';
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
  }
  document.addEventListener('keydown', e => { if(e.key==='Enter') sendReset(); });
</script>
</body>
</html>
